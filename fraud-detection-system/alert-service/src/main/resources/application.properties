# Server Configuration
server.port=8081

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/fraud_detection
spring.datasource.username=fraud_user
spring.datasource.password=fraud_pass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=alert-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest

# Application Name
spring.application.name=alert-service
